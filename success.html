<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iTreeView | Purchase Successful</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .success-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: #0b1220;
      color: white;
    }

    .success-card {
      width: 100%;
      max-width: 760px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .success-card h1 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    .success-card p {
      line-height: 1.5;
    }

    .license-box {
      margin-top: 22px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .license-row {
      margin-bottom: 14px;
    }

    .license-label {
      font-size: 0.9rem;
      opacity: 0.75;
      margin-bottom: 4px;
    }

    .license-value {
      font-size: 1.1rem;
      font-weight: 600;
      word-break: break-word;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-link {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      background: #3aa0ff;
      color: white;
    }

    .muted {
      opacity: 0.8;
      margin-top: 16px;
    }

    .error-text {
      color: #ffb4b4;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="success-wrap">
    <div class="success-card">
      <h1>Payment successful</h1>
      <p>Your iTreeView license is being prepared.</p>

      <div class="license-box">
        <div class="license-row">
          <div class="license-label">Email</div>
          <div class="license-value" id="licenseEmail">Loading...</div>
        </div>

        <div class="license-row">
          <div class="license-label">License Key</div>
          <div class="license-value" id="licenseKey">Loading...</div>
        </div>

        <div class="license-row">
          <div class="license-label">Expiry</div>
          <div class="license-value" id="licenseExpiry">Loading...</div>
        </div>
      </div>

      <p class="muted" id="statusText">
        Please wait while we confirm the payment and generate your key.
      </p>

      <p class="error-text" id="errorText"></p>

      <div class="actions">
        <a class="btn-link" href="index.html">Back to site</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");

    const emailEl = document.getElementById("licenseEmail");
    const keyEl = document.getElementById("licenseKey");
    const expiryEl = document.getElementById("licenseExpiry");
    const statusEl = document.getElementById("statusText");
    const errorEl = document.getElementById("errorText");

    async function loadLicense() {
      if (!sessionId) {
        errorEl.textContent = "Missing session_id in the URL.";
        statusEl.textContent = "";
        return;
      }

      for (let i = 0; i < 10; i++) {
        try {
          const response = await fetch(
            `https://itreeview-license-api.onrender.com/api/license-by-session?session_id=${encodeURIComponent(sessionId)}`
          );

          const data = await response.json();

          if (response.ok && data.success) {
            emailEl.textContent = data.license.email;
            keyEl.textContent = data.license.licenseKey;
            expiryEl.textContent = new Date(data.license.expiryUtc).toLocaleString();
            statusEl.textContent = "Your license is ready. Copy this key and activate the application.";
            errorEl.textContent = "";
            return;
          }
        } catch (err) {
        }

        await new Promise(resolve => setTimeout(resolve, 2000));
      }

      emailEl.textContent = "-";
      keyEl.textContent = "-";
      expiryEl.textContent = "-";
      statusEl.textContent = "";
      errorEl.textContent = "We could not load your license yet. Please refresh this page in a few moments. If needed, contact JPG.BizCEO@gmail.com.";
    }

    loadLicense();
  </script>
</body>
</html>
